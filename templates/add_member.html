{% extends "base.html" %}
{% block content %}
<div class="top-bar">
    <h1>Add New Member</h1>
    <a href="{{ url_for('members') }}" class="btn btn-secondary"><span class="material-symbols-outlined">arrow_back</span> Back to Members</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('add_member') }}">
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">person</span> Full Name *</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Enter member name" required>
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">sell</span> Membership Plan *</label>
                <select id="plan" name="plan" class="form-control" required>
                    <option value="">-- Select Plan --</option>
                    <option value="1 Month">1 Month</option>
                    <option value="3 Months">3 Months</option>
                    <option value="6 Months">6 Months</option>
                    <option value="1 Year">1 Year</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">phone</span> Phone (optional)</label>
                <div style="display:flex; align-items:stretch;">
                    <span style="background:var(--bg-secondary); border:1px solid var(--border-color); border-right:none; border-radius:8px 0 0 8px; padding:8px 12px; display:flex; align-items:center; color:var(--text-secondary); font-size:14px;">+91</span>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="Enter phone number" style="border-radius:0 8px 8px 0;">
                </div>
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">mail</span> Email (optional)</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter email address">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">calendar_today</span> Joining Date *</label>
                <input type="date" id="joining_date" name="joining_date" class="form-control" required>
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">event_busy</span> Membership Expiry Date *</label>
                <input type="date" id="expiry_date" name="expiry_date" class="form-control" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">add</span> Extend Days (optional)</label>
                <input type="number" id="extend_days" name="extend_days" class="form-control" placeholder="Extra days to add" min="0" step="1">
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">fitness_center</span> Trainer</label>
                <input type="text" id="trainer" name="trainer" class="form-control" placeholder="Enter trainer name" list="trainerList" autocomplete="off">
                <datalist id="trainerList">
                    {% for t in trainers %}
                    <option value="{{ t }}">
                    {% endfor %}
                </datalist>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">currency_rupee</span> Total Price</label>
                <input type="number" id="price" name="price" class="form-control" placeholder="0" min="0" step="0.01">
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">payments</span> Payment Mode</label>
                <select id="payment_mode" name="payment_mode" class="form-control" onchange="togglePaymentMode()">
                    <option value="Cash">Cash</option>
                    <option value="Online">Online</option>
                    <option value="Both">Both</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">calendar_month</span> Paid Date</label>
                <input type="date" id="paid_date" name="paid_date" class="form-control">
            </div>
            <div class="form-group" id="single_amount_group">
                <label><span class="material-symbols-outlined">account_balance_wallet</span> Amount Paid</label>
                <input type="number" id="amount_paid" name="amount_paid" class="form-control" placeholder="0" min="0" step="0.01">
            </div>
        </div>
        <div class="form-row" id="both_amounts_group" style="display:none;">
            <div class="form-group">
                <label><span class="material-symbols-outlined">payments</span> Cash Amount</label>
                <input type="number" id="cash_amount" name="cash_amount" class="form-control" placeholder="0" min="0" step="0.01">
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">smartphone</span> Online Amount</label>
                <input type="number" id="online_amount" name="online_amount" class="form-control" placeholder="0" min="0" step="0.01">
            </div>
        </div>
        <div class="form-group">
            <label>Balance Payment Required?</label>
            <div class="form-row" style="grid-template-columns: auto auto; gap: 30px;">
                <div class="form-check">
                    <input type="radio" id="balance_no" name="has_balance" value="no" checked>
                    <label for="balance_no">No</label>
                </div>
                <div class="form-check">
                    <input type="radio" id="balance_yes" name="has_balance" value="yes">
                    <label for="balance_yes">Yes</label>
                </div>
            </div>
        </div>
        <div class="balance-fields">
            <div class="form-row">
                <div class="form-group">
                    <label><span class="material-symbols-outlined">payments</span> Balance Amount *</label>
                    <input type="number" id="balance_amount" name="balance_amount" class="form-control" placeholder="Enter balance amount" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label><span class="material-symbols-outlined">calendar_month</span> Last Date to Pay *</label>
                    <input type="date" id="balance_due_date" name="balance_due_date" class="form-control">
                </div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center; padding: 12px;"><span class="material-symbols-outlined">save</span> Add Member</button>
            <a href="{{ url_for('members') }}" class="btn btn-secondary" style="padding: 12px 24px;"><span class="material-symbols-outlined">close</span> Cancel</a>
        </div>
    </form>
</div>

<script>
function togglePaymentMode() {
    const mode = document.getElementById('payment_mode').value;
    document.getElementById('single_amount_group').style.display = mode === 'Both' ? 'none' : '';
    document.getElementById('both_amounts_group').style.display = mode === 'Both' ? '' : 'none';
    if (mode === 'Both') {
        document.getElementById('cash_amount').value = '';
        document.getElementById('online_amount').value = '';
    }
}

function calcExpiry() {
    const plan = document.getElementById('plan').value;
    const joinDate = document.getElementById('joining_date').value;
    const extend = parseInt(document.getElementById('extend_days').value) || 0;
    var planDays = {'1 Month': 30, '3 Months': 90, '6 Months': 180, '1 Year': 365};
    if (plan && planDays[plan] && joinDate) {
        var d = new Date(joinDate + 'T00:00:00');
        d.setDate(d.getDate() + planDays[plan] + extend);
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        document.getElementById('expiry_date').value = y + '-' + m + '-' + day;
    }
}

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('plan').addEventListener('change', calcExpiry);
    document.getElementById('joining_date').addEventListener('change', calcExpiry);
    document.getElementById('extend_days').addEventListener('input', calcExpiry);
});
</script>
{% endblock %}
