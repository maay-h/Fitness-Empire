{% extends "base.html" %}
{% block content %}
<div class="top-bar">
    <h1>Edit Member</h1>
    <a href="{{ url_for('member_detail', member_id=member['id']) }}" class="btn btn-secondary"><span class="material-symbols-outlined">arrow_back</span> Back</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('edit_member', member_id=member['id']) }}">
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">person</span> Full Name *</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ member['name'] }}" required>
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">sell</span> Membership Plan *</label>
                <select id="plan" name="plan" class="form-control" required>
                    <option value="1 Month" {{ 'selected' if member['plan'] == '1 Month' }}>1 Month</option>
                    <option value="3 Months" {{ 'selected' if member['plan'] == '3 Months' }}>3 Months</option>
                    <option value="6 Months" {{ 'selected' if member['plan'] == '6 Months' }}>6 Months</option>
                    <option value="1 Year" {{ 'selected' if member['plan'] == '1 Year' }}>1 Year</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">phone</span> Phone (optional)</label>
                <div style="display:flex; align-items:stretch;">
                    <span style="background:var(--bg-secondary); border:1px solid var(--border-color); border-right:none; border-radius:8px 0 0 8px; padding:8px 12px; display:flex; align-items:center; color:var(--text-secondary); font-size:14px;">+91</span>
                    <input type="tel" id="phone" name="phone" class="form-control" value="{{ (member['phone'][2:] if member['phone'] and member['phone'].startswith('91') else member['phone']) or '' }}" placeholder="Enter phone number" style="border-radius:0 8px 8px 0;">
                </div>
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">mail</span> Email (optional)</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ member['email'] or '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">calendar_today</span> Joining Date (optional)</label>
                <input type="date" id="joining_date" name="joining_date" class="form-control" value="{{ member['joining_date'] or '' }}">
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">event_busy</span> Membership Expiry Date (optional)</label>
                <input type="date" id="expiry_date" name="expiry_date" class="form-control" value="{{ member['expiry_date'] or '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">receipt</span> Bill Number (optional)</label>
                <input type="text" id="bill_number" name="bill_number" class="form-control" value="{{ member['bill_number'] or '' }}" placeholder="Enter bill number">
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">fitness_center</span> Trainer (optional)</label>
                <input type="text" id="trainer" name="trainer" class="form-control" value="{{ member['trainer'] or '' }}" placeholder="Enter trainer name">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">currency_rupee</span> Total Price</label>
                <input type="number" id="price" name="price" class="form-control" value="{{ member['price'] or 0 }}" min="0" step="0.01">
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">payments</span> Payment Mode</label>
                <select id="payment_mode" name="payment_mode" class="form-control" onchange="togglePaymentMode()">
                    <option value="Cash" {{ 'selected' if (member['payment_mode'] or 'Cash') == 'Cash' }}>Cash</option>
                    <option value="Online" {{ 'selected' if member['payment_mode'] == 'Online' }}>Online</option>
                    <option value="Both" {{ 'selected' if member['payment_mode'] == 'Both' }}>Both</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><span class="material-symbols-outlined">calendar_month</span> Paid Date</label>
                <input type="date" id="paid_date" name="paid_date" class="form-control" value="{{ member['paid_date'] or '' }}">
            </div>
            <div class="form-group" id="single_amount_group">
                <label><span class="material-symbols-outlined">account_balance_wallet</span> Amount Paid</label>
                <input type="number" id="amount_paid" name="amount_paid" class="form-control" value="{{ member['amount_paid'] or 0 }}" min="0" step="0.01">
            </div>
        </div>
        <div class="form-row" id="both_amounts_group" style="display:{{ 'none' if member['payment_mode'] != 'Both' else '' }};">
            <div class="form-group">
                <label><span class="material-symbols-outlined">payments</span> Cash Amount</label>
                <input type="number" id="cash_amount" name="cash_amount" class="form-control" value="{{ member['cash_amount'] or 0 }}" min="0" step="0.01">
            </div>
            <div class="form-group">
                <label><span class="material-symbols-outlined">smartphone</span> Online Amount</label>
                <input type="number" id="online_amount" name="online_amount" class="form-control" value="{{ member['online_amount'] or 0 }}" min="0" step="0.01">
            </div>
        </div>
        <div class="form-group">
            <label>Balance Payment Required?</label>
            <div class="form-row" style="grid-template-columns: auto auto; gap: 30px;">
                <div class="form-check">
                    <input type="radio" id="balance_no" name="has_balance" value="no" {{ 'checked' if not member['balance_amount'] or member['balance_amount'] == 0 else '' }}>
                    <label for="balance_no">No</label>
                </div>
                <div class="form-check">
                    <input type="radio" id="balance_yes" name="has_balance" value="yes" {{ 'checked' if member['balance_amount'] and member['balance_amount'] > 0 else '' }}>
                    <label for="balance_yes">Yes</label>
                </div>
            </div>
        </div>
        <div class="balance-fields {{ 'show' if member['balance_amount'] and member['balance_amount'] > 0 else '' }}">
            <div class="form-row">
                <div class="form-group">
                    <label><span class="material-symbols-outlined">payments</span> Balance Amount *</label>
                    <input type="number" id="balance_amount" name="balance_amount" class="form-control" value="{{ member['balance_amount'] or 0 }}" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label><span class="material-symbols-outlined">calendar_month</span> Last Date to Pay *</label>
                    <input type="date" id="balance_due_date" name="balance_due_date" class="form-control" value="{{ member['balance_due_date'] or '' }}">
                </div>
            </div>
        </div>
        <div class="form-group">
            <label><span class="material-symbols-outlined">circle</span> Status</label>
            <select id="status" name="status" class="form-control">
                <option value="active" {{ 'selected' if member['status'] == 'active' else '' }}>Active</option>
                <option value="expired" {{ 'selected' if member['status'] == 'expired' else '' }}>Expired</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center; padding: 12px;"><span class="material-symbols-outlined">save</span> Update Member</button>
            <a href="{{ url_for('member_detail', member_id=member['id']) }}" class="btn btn-secondary" style="padding: 12px 24px;"><span class="material-symbols-outlined">close</span> Cancel</a>
        </div>
    </form>
</div>

<script>
function togglePaymentMode() {
    const mode = document.getElementById('payment_mode').value;
    document.getElementById('single_amount_group').style.display = mode === 'Both' ? 'none' : '';
    document.getElementById('both_amounts_group').style.display = mode === 'Both' ? '' : 'none';
}
</script>
{% endblock %}
