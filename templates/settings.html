{% extends "base.html" %}
{% block content %}
<div class="top-bar">
    <h1>Settings</h1>
</div>

<div class="card" style="max-width:500px;">
    <div class="card-header">
        <h3>Admin Password</h3>
    </div>
    <div class="card-body">
        <p style="margin-bottom:16px; color:var(--text-secondary);">
            This password protects the Admin section.
            {% if not admin_password_set %}
            <span style="color:var(--warning); font-weight:600;">No password is currently set — anyone can access Admin.</span>
            {% endif %}
        </p>
        <form method="POST" action="{{ url_for('change_password') }}">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" class="form-control" placeholder="Leave blank if none set" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" placeholder="At least 4 characters" minlength="4" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Re-enter new password" minlength="4" required autocomplete="new-password">
            </div>
            <div style="margin-top:20px;">
                <button type="submit" class="btn btn-primary">Update Password</button>
            </div>
        </form>
    </div>
</div>

<div class="card" style="max-width:500px;">
    <div class="card-header">
        <h3>Session</h3>
    </div>
    <div class="card-body">
        <p style="margin-bottom:16px; color:var(--text-secondary);">
            You are currently logged into the site.
        </p>
        <a href="{{ url_for('site_logout') }}" class="btn btn-danger" style="display:inline-flex; align-items:center; gap:6px; text-decoration:none;">
            <span class="material-symbols-outlined" style="font-size:1.2rem;">logout</span> Logout
        </a>
    </div>
</div>
{% endblock %}
